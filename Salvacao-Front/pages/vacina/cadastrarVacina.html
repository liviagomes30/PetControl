<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
                name="description"
                content="Cadastro de Vacinas - PetControl"
        />
        <title>PetControl - Nova Vacina</title>
        <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css"
        />
        <link rel="stylesheet" href="../../assets/css/style.css" />
        <script src="../../assets/js/components/sidebar.js" defer></script>
    </head>
    <body>
        <main class="main-content">
            <header class="content-header">
                <button
                        class="btn-back"
                        onclick="window.location.href='listarVacinas.html'"
                        aria-label="Voltar para lista de vacinas"
                >
                    <i class="bi bi-arrow-left"></i> Voltar
                </button>
                <h1>Cadastrar Vacina</h1>
            </header>

            <div class="form-container">
                <form id="vacinaForm" novalidate>
                    <input type="hidden" id="id_vacina" value="0" />

                    <div class="form-group">
                        <label for="descricao_vacina" class="required">Descrição</label>
                        <input
                                type="text"
                                id="descricao_vacina"
                                name="descricao_vacina"
                                required
                                placeholder="Digite o nome ou descrição da vacina"
                                aria-required="true"
                                aria-describedby="descricao-error descricao-help"
                        />
                        <div
                                class="error-message"
                                id="descricao-error"
                                aria-live="polite"
                        ></div>
                        <small id="descricao-help" class="form-help-text">
                            Por exemplo: V10, Antirrábica, Giárdia...
                        </small>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Confirmar
                        </button>
                        <button
                                type="button"
                                class="btn btn-secondary"
                                onclick="window.location.href='listarVacinas.html'"
                        >
                            Cancelar
                        </button>
                    </div>
                </form>
            </div>

            <div
                    id="toast"
                    class="toast"
                    role="alert"
                    aria-live="assertive"
                    aria-atomic="true"
            >
                <div class="toast-icon success">
                    <i class="bi bi-check-circle"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title" id="toastTitle">Sucesso!</div>
                    <div class="toast-message" id="toastMessage">
                        Vacina cadastrada com sucesso!
                    </div>
                </div>
                <button class="toast-close" aria-label="Fechar notificação">
                    <i class="bi bi-x"></i>
                </button>
            </div>

            <div id="loadingOverlay" class="loading-overlay">
                <div class="spinner" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
            </div>
        </main>

        <script src="../../assets/js/models/VacinaModel.js"></script>
        <script src="../../assets/js/services/VacinaService.js"></script>
        <script src="../../assets/js/controllers/VacinaController.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                // Iniciar o controlador quando a página carregar
                // Certifique-se de que VacinaController está definido e exportado corretamente
                // Exemplo: window.vacinaController = new VacinaController(UIComponents); // Se usar UIComponents
                window.vacinaController = new VacinaController();

                // Adicionar validação em tempo real para o formulário
                const descricaoInput = document.getElementById("descricao_vacina");
                const descricaoError = document.getElementById("descricao-error");

                descricaoInput.addEventListener("input", function () {
                    validarDescricao(this);
                });

                descricaoInput.addEventListener("blur", function () {
                    validarDescricao(this);
                });

                function validarDescricao(campo) {
                    if (campo.value.trim() === "") {
                        descricaoError.textContent = "Este campo é obrigatório";
                        campo.classList.add("invalid");
                        return false;
                    } else if (campo.value.length < 2) {
                        descricaoError.textContent =
                                "A descrição deve ter pelo menos 2 caracteres";
                        campo.classList.add("invalid");
                        return false;
                    } else if (campo.value.length > 100) { // Exemplo de tamanho máximo
                        descricaoError.textContent =
                                "A descrição deve ter no máximo 100 caracteres";
                        campo.classList.add("invalid");
                        return false;
                    }
                    else {
                        descricaoError.textContent = "";
                        campo.classList.remove("invalid");
                        return true;
                    }
                }

                // Validação ao enviar o formulário
                const form = document.getElementById("vacinaForm");
                form.addEventListener("submit", function (event) {
                    event.preventDefault();

                    const descricaoValido = validarDescricao(descricaoInput);

                    if (descricaoValido) {
                        // Exibir loading
                        document.getElementById("loadingOverlay").classList.add("show");

                        // Processar o formulário via controlador
                        const vacina = {
                            id: document.getElementById("id_vacina").value, // Para o backend será id_vacina ou o nome que você definir no DTO/Model
                            descricao: descricaoInput.value.trim() // Para o backend será descricao_vacina ou o nome no DTO/Model
                        };

                        // Chamar o método salvar do controller
                        window.vacinaController.salvar(vacina)
                                .then(() => {
                                    mostrarToast(
                                            "Sucesso!",
                                            "Vacina cadastrada com sucesso!",
                                            "success"
                                    );
                                    setTimeout(() => {
                                        window.location.href = "listarVacinas.html";
                                    }, 2000);
                                })
                                .catch((erro) => {
                                    mostrarToast(
                                            "Erro!",
                                            "Não foi possível cadastrar a vacina. Tente novamente.",
                                            "error"
                                    );
                                    console.error("Erro ao cadastrar vacina:", erro);
                                    document.getElementById("loadingOverlay").classList.remove("show");
                                });
                    }
                });

                // Função para mostrar toast (similar a outras páginas)
                function mostrarToast(titulo, mensagem, tipo = "success") {
                    const toast = document.getElementById("toast");
                    const toastTitle = document.getElementById("toastTitle");
                    const toastMessage = document.getElementById("toastMessage");
                    const toastIconDiv = document.querySelector(".toast-icon"); // Seleciona a div do ícone

                    toastTitle.textContent = titulo;
                    toastMessage.textContent = mensagem;

                    // Ajustar classe e ícone
                    toastIconDiv.className = "toast-icon " + tipo; // Define a classe para a cor de fundo
                    if (tipo === "success") {
                        toastIconDiv.innerHTML = '<i class="bi bi-check-circle"></i>';
                    } else {
                        toastIconDiv.innerHTML = '<i class="bi bi-exclamation-triangle"></i>';
                    }

                    toast.classList.add("show");
                    setTimeout(() => {
                        toast.classList.remove("show");
                    }, 5000);
                }

                const toastClose = document.querySelector(".toast-close");
                if (toastClose) {
                    toastClose.addEventListener("click", function () {
                        document.getElementById("toast").classList.remove("show");
                    });
                }
            });
        </script>
    </body>
</html>
